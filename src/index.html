<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>iroh-transfer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span id="node-status-icon">🔴</span>
      <span id="node-status">节点离线</span>
      <span id="node-id" class="node-id"></span>
      <button id="btn-start-node" class="btn btn-primary">启动节点</button>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
      <!-- 发送面板 -->
      <div class="panel">
        <h2>📤 发送文件</h2>
        <div id="drop-zone" class="drop-zone" style="cursor:pointer">
          <p>📂 点击选择文件</p>
          <p class="hint">弹出文件选择对话框</p>
        </div>
        <div id="send-result" style="display:none">
          <div class="result-box">
            <p>文件: <strong id="send-file-name"></strong> (<span id="send-file-size"></span>)</p>
            <p style="margin-top:8px; color:#8b949e; font-size:13px;">将票据和文件名一起发给对方：</p>
            <p style="color:#58a6ff; font-size:13px;">文件名: <strong id="send-file-name-copy"></strong></p>
            <div id="ticket-display" class="ticket-display"></div>
            <button id="btn-copy-ticket" class="btn">复制票据</button>
          </div>
        </div>
      </div>

      <!-- 接收面板 -->
      <div class="panel">
        <h2>📥 接收文件</h2>
        <textarea id="ticket-input" class="ticket-input" placeholder="粘贴对方发来的票据..."></textarea>
        <div class="save-path-row">
          <span>文件名:</span>
          <input id="save-filename" class="save-path-input" value="" placeholder="输入保存的文件名（如photo.jpg）">
        </div>
        <button id="btn-receive" class="btn btn-primary">接收文件</button>
        <div id="receive-result" style="display:none">
          <div class="result-box">
            <p id="receive-status"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- 传输历史 -->
    <div class="history-panel">
      <h2>📋 传输历史</h2>
      <div id="transfer-history" class="history-list">
        <div class="history-item" style="color:#484f58;">暂无记录</div>
      </div>
    </div>
  </div>

  <script>
    // Tauri 2.x 内置 IPC，无需 npm 包
    const invoke = window.__TAURI_INTERNALS__.invoke;

    // 传输历史
    const history = [];

    // === 节点管理 ===
    const nodeStatusIcon = document.getElementById('node-status-icon');
    const nodeStatus = document.getElementById('node-status');
    const nodeId = document.getElementById('node-id');
    const btnStartNode = document.getElementById('btn-start-node');

    btnStartNode.addEventListener('click', async () => {
      btnStartNode.disabled = true;
      btnStartNode.textContent = '启动中...';
      try {
        const id = await invoke('start_node');
        nodeStatusIcon.textContent = '🟢';
        nodeStatus.textContent = '节点在线';
        nodeId.textContent = id.substring(0, 24) + '...';
        btnStartNode.style.display = 'none';
      } catch (e) {
        nodeStatus.textContent = '启动失败: ' + e;
        btnStartNode.disabled = false;
        btnStartNode.textContent = '重试';
      }
    });

    // === 发送文件 ===
    const dropZone = document.getElementById('drop-zone');
    const sendResult = document.getElementById('send-result');
    const sendFileName = document.getElementById('send-file-name');
    const sendFileSize = document.getElementById('send-file-size');
    const ticketDisplay = document.getElementById('ticket-display');
    const btnCopyTicket = document.getElementById('btn-copy-ticket');

    dropZone.addEventListener('click', async () => {
      dropZone.innerHTML = '<p>⏳ 选择文件中...</p>';
      try {
        const filePath = await invoke('pick_file');
        if (!filePath) {
          dropZone.innerHTML = '<p>📂 点击选择文件</p><p class="hint">弹出文件选择对话框</p>';
          return;
        }
        dropZone.innerHTML = '<p>⏳ 上传中...</p>';
        const result = await invoke('send_file', { filePath });
        const name = filePath.split('/').pop();
        sendFileName.textContent = name;
        sendFileSize.textContent = '...';
        document.getElementById('send-file-name-copy').textContent = name;
        ticketDisplay.textContent = result.ticket;
        sendResult.style.display = 'block';
        dropZone.innerHTML = '<p>✅ 上传完成</p><p class="hint">点击继续选择文件</p>';
        addHistory('发送', name, '成功');
      } catch (e) {
        dropZone.innerHTML = '<p>❌ 上传失败: ' + e + '</p><p class="hint">点击重试</p>';
        addHistory('发送', '-', '失败');
      }
    });

    btnCopyTicket.addEventListener('click', async () => {
      try {
        const name = document.getElementById('send-file-name-copy').textContent;
        const ticket = ticketDisplay.textContent;
        await navigator.clipboard.writeText('文件名: ' + name + '\n票据: ' + ticket);
        btnCopyTicket.textContent = '已复制 ✓';
        setTimeout(() => { btnCopyTicket.textContent = '复制票据和文件名'; }, 2000);
      } catch (e) {
        btnCopyTicket.textContent = '复制失败';
      }
    });

    // === 接收文件 ===
    const ticketInput = document.getElementById('ticket-input');
    const saveFilenameInput = document.getElementById('save-filename');
    const btnReceive = document.getElementById('btn-receive');
    const receiveResult = document.getElementById('receive-result');
    const receiveStatus = document.getElementById('receive-status');

    btnReceive.addEventListener('click', async () => {
      const ticket = ticketInput.value.trim();
      if (!ticket) { ticketInput.focus(); return; }

      const filename = saveFilenameInput.value.trim();
      if (!filename) {
        receiveStatus.textContent = '❌ 请输入保存的文件名（含扩展名，如photo.jpg）';
        receiveResult.style.display = 'block';
        return;
      }

      // 拼接完整路径: ~/Downloads/文件名
      const home = await invoke('get_home_dir');
      const outPath = home + '/Downloads/' + filename;

      btnReceive.disabled = true;
      btnReceive.textContent = '接收中...';
      receiveResult.style.display = 'none';

      try {
        const result = await invoke('receive_file', { ticket, savePath: outPath });
        receiveStatus.textContent = '✅ ' + result;
        receiveResult.style.display = 'block';
        addHistory('接收', filename, '成功');
      } catch (e) {
        receiveStatus.textContent = '❌ ' + e;
        receiveResult.style.display = 'block';
        addHistory('接收', filename, '失败');
      } finally {
        btnReceive.disabled = false;
        btnReceive.textContent = '接收文件';
      }
    });

    // === 工具函数 ===
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function addHistory(type, name, status) {
      const time = new Date().toLocaleTimeString('zh-CN');
      history.unshift({ type, name, status, time });
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('transfer-history');
      list.innerHTML = history.slice(0, 10).map(h =>
        `<div class="history-item">${h.type} | ${h.name} | ${h.status} | ${h.time}</div>`
      ).join('');
    }
  </script>
</body>
</html>
