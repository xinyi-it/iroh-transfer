name: Release

# 推送 v* 格式的 tag 时触发自动打包并发布 GitHub Release
on:
  push:
    tags:
      - 'v*'
  # 支持手动触发（用于测试打包流程，不发布 Release）
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14       # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04   # Linux (仅 deb)
            args: '--bundles deb'
          - platform: windows-latest # Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install root dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'iroh-transfer ${{ github.ref_name }}'
          releaseBody: 'P2P 文件传输桌面应用。下方为对应平台的安装包，下载后双击安装即可。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
